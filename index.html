<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <!-- 顶部标题 -->
    <header class="header">
      <h1 class="logo">Music</h1>
      <span class="track-count" id="trackCount">0 tracks</span>
    </header>

    <!-- 播放列表 -->
    <main class="playlist" id="playlist"></main>

    <!-- 底部播放栏 -->
    <footer class="player-bar" id="playerBar">
      <div class="now-playing">
        <img class="cover-thumb" id="coverThumb" src="" alt="">
        <div class="track-info">
          <div class="track-title" id="nowTitle">未选择曲目</div>
          <div class="track-artist" id="nowArtist">-</div>
        </div>
      </div>
      <div class="controls">
        <button class="btn" id="btnPrev" title="上一首">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg>
        </button>
        <button class="btn btn-play" id="btnPlay" title="播放">
          <svg class="icon-play" viewBox="0 0 24 24" width="28" height="28"><path fill="currentColor" d="M8 5v14l11-7z"/></svg>
          <svg class="icon-pause" viewBox="0 0 24 24" width="28" height="28" style="display:none"><path fill="currentColor" d="M6 19h4V5H6zm8-14v14h4V5z"/></svg>
        </button>
        <button class="btn" id="btnNext" title="下一首">
          <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
        </button>
      </div>
      <div class="progress-wrap">
        <span class="time" id="timeCurrent">0:00</span>
        <input type="range" class="progress-bar" id="progressBar" min="0" max="100" value="0" step="0.1">
        <span class="time" id="timeDuration">0:00</span>
      </div>
      <div class="volume-wrap">
        <svg viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
        <input type="range" class="volume-bar" id="volumeBar" min="0" max="100" value="80">
      </div>
    </footer>
  </div>

  <audio id="audio"></audio>
  <script src="player.js"></script>
</body>
</html>
